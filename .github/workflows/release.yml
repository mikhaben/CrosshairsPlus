name: Package and Release

# Builds the addon and uploads it to CurseForge, Wago, and GitHub Releases
# when you push a version tag (e.g. v1.6.2).
#
# Tag-driven on purpose: the BigWigsMods packager refuses to package a tag it
# reaches via a branch push ("Found future tag, not packaging"), so releases
# must be triggered by the tag itself — not by pushing a branch.
#
# Only tags pointing to commits on main are published: a tag push event has no
# branch context, so the "Verify tag is on main" step enforces this and fails
# the run for tags cut from any other branch.
#
# Release flow:
#   1. Bump ## Version in CrosshairsPlus/CrosshairsPlus.toc and add
#      release-notes/<version>.md (this becomes the CurseForge/Wago changelog).
#   2. Commit, then tag and push the tag:
#        git tag v1.6.2
#        git push origin v1.6.2
#
# .pkgmeta uses move-folders to ship BOTH addon folders (CrosshairsPlus and the
# LoadOnDemand CrosshairsPlus_Range) at the zip top level.
#
# ── One-time setup ───────────────────────────────────────────────────────────
#  Deploy runs ONLY when BOTH API keys are present; otherwise the job skips the
#  upload and logs a warning instead of publishing to just one platform.
#
#  Repo secrets (Settings → Secrets and variables → Actions → New secret):
#       CF_API_KEY      CurseForge token  (legacy.curseforge.com → My API Tokens)
#       WAGO_API_KEY    Wago token        (addons.wago.io → account → API tokens)
#     GITHUB_TOKEN is provided automatically — do not create it.
#  Project IDs live in CrosshairsPlus/CrosshairsPlus.toc (## X-Curse-Project-ID / ## X-Wago-ID).
#
# ── Security ─────────────────────────────────────────────────────────────────
#  The checkout and packager actions are pinned to full commit SHAs (not the
#  floating @v5/@v2 tags) so a compromised upstream release can't exfiltrate
#  the API keys. To update, pick a new SHA from the action's releases page and
#  bump it below.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check deploy credentials
        id: creds
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_KEY: ${{ secrets.WAGO_API_KEY }}
        run: |
          if [ -n "$CF_API_KEY" ] && [ -n "$WAGO_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Deploy skipped — both CF_API_KEY and WAGO_API_KEY secrets must be set to publish."
          fi

      - name: Checkout
        if: steps.creds.outputs.ready == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0   # full history + tags for version detection

      - name: Verify tag is on main
        if: steps.creds.outputs.ready == 'true'
        run: |
          if git merge-base --is-ancestor HEAD origin/main; then
            echo "Tag ${GITHUB_REF_NAME} points to a commit on main — proceeding."
          else
            echo "::error::Tag ${GITHUB_REF_NAME} is not on main — refusing to publish."
            exit 1
          fi

      - name: Assemble per-version changelog
        if: steps.creds.outputs.ready == 'true'
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [ -f "release-notes/${version}.md" ]; then
            cp "release-notes/${version}.md" CHANGELOG.md
            echo "Using release-notes/${version}.md as the changelog."
          else
            echo "::warning::release-notes/${version}.md not found — falling back to a minimal changelog."
            printf '# %s\n\nSee the project page for details.\n' "$version" > CHANGELOG.md
          fi

      - name: Package and release
        if: steps.creds.outputs.ready == 'true'
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_KEY }}   # env var must stay WAGO_API_TOKEN (packager requirement); secret is WAGO_API_KEY for consistency
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
